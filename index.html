<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQQ - Danh Sách Bài Quyền</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #8B4513; /* Nâu đất */
            --secondary-color: #DAA520; /* Vàng đồng */
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0d8c8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper-2.png');
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, rgba(139,69,19,1) 0%, rgba(107,53,14,1) 100%);
            color: var(--secondary-color);
            width: 100%;
            padding: 2.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            color: #fff;
            opacity: 0.9;
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 3rem auto;
            flex-grow: 1;
        }

        /* --- Bổ sung CSS cho thanh tìm kiếm --- */
        .search-container {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .search-container i {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-right: 15px;
        }

        .search-container input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.05rem;
            color: var(--text-color);
            background: transparent;
            font-family: inherit;
        }

        .search-container input::placeholder {
            color: #999;
            font-style: italic;
        }
        /* -------------------------------------- */

        /* Bảng hiển thị */
        .table-container {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow-x: auto; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            text-align: left;
        }

        th, td {
            padding: 1rem 1.2rem;
            border: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
        }

        th i {
            margin-right: 6px;
            color: var(--secondary-color);
        }

        tr:nth-child(even) { background-color: #fdfaf5; }
        tr:hover { background-color: #f0ebd8; }

        /* Nút xem chi tiết (chứa link) */
        .detail-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 15px;
            background-color: #c0392b; 
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.95rem;
            transition: background-color 0.3s;
            font-weight: 500;
        }

        .detail-btn:hover {
            background-color: #922b21;
        }

        /* Thông báo khi không tìm thấy kết quả */
        #no-results {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--primary-color);
            font-style: italic;
            font-weight: 500;
        }

        footer {
            width: 100%;
            background-color: var(--primary-color);
            padding: 1.5rem 0;
            text-align: center;
            color: white;
            font-size: 0.95rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>Danh Sách Bài Quyền</h1>
        <p>Hệ thống chuyên môn</p>
    </header>

    <div class="container">
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Nhập tên bài quyền hoặc kĩ thuật cần tìm...">
        </div>

        <div class="table-container">
            <table id="quanTable">
                <thead>
                    <tr>
                        <th style="width: 10%; text-align: center;">STT</th>
                        <th style="width: 70%;"><i class="fa-solid fa-yin-yang"></i> Tên Bài Quyền / Tên Kĩ Thuật</th>
                        <th style="width: 20%; text-align: center;"><i class="fa-solid fa-link"></i> Chi Tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="item-row">
                        <td style="text-align: center; font-weight: bold;">1</td>
                        <td style="font-weight: 500; font-size: 1.1rem; color: var(--primary-color);" class="item-name">Lão Hổ Thượng Sơn</td>
                        <td style="text-align: center;">
                            <a href="https://lelevietnam99.github.io/A1-LAOHOTHUONGSON/" class="detail-btn">
                                <i class="fa-solid fa-eye"></i> Xem Chi Tiết
                            </a>
                        </td>
                    </tr>
                    <tr class="item-row">
                        <td style="text-align: center; font-weight: bold;">2</td>
                        <td style="font-weight: 500; font-size: 1.1rem; color: var(--primary-color);" class="item-name">Hùng Kê Quyền</td>
                        <td style="text-align: center;">
                            <a href="https://lelevietnam99.github.io/A1-HUNGKEQUYEN/" class="detail-btn">
                                <i class="fa-solid fa-eye"></i> Xem Chi Tiết
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div id="no-results">Không tìm thấy bài quyền/kĩ thuật nào phù hợp.</div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Môn Phái PQQ - Ban Chuyên Môn</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const rows = document.querySelectorAll('.item-row');
            const noResultsDiv = document.getElementById('no-results');

            searchInput.addEventListener('input', function(e) {
                // Lấy từ khóa, chuyển về chữ thường và xóa khoảng trắng thừa
                const searchTerm = e.target.value.toLowerCase().trim();
                let hasResults = false;

                rows.forEach(row => {
                    // Cột chứa tên bài quyền có class là item-name
                    const itemName = row.querySelector('.item-name').textContent.toLowerCase();
                    
                    if (itemName.includes(searchTerm)) {
                        row.style.display = ''; // Hiện dòng nếu khớp
                        hasResults = true;
                    } else {
                        row.style.display = 'none'; // Ẩn dòng nếu không khớp
                    }
                });

                // Hiển thị thông báo nếu không có dòng nào khớp
                if (hasResults) {
                    noResultsDiv.style.display = 'none';
                } else {
                    noResultsDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
